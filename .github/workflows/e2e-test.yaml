name: E2E test

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/e2e-test.yaml
      - server/**
      - r-pkg/**
      - tests/**
      - "!**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/e2e-test.yaml
      - server/**
      - r-pkg/**
      - tests/**
      - "!**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-pkg
          extra-packages: any::ragg, any::ggplot2

      - uses: denoland/setup-deno@v2
        with:
          # Pinned to 2.7.11 pending a regression introduced in 2.7.12:
          # the native uv_pipe_t rewrite (denoland/deno#33165) causes the
          # node:net pipe listener to stop accepting subsequent client
          # connections after the first one disconnects on Windows, which
          # hangs the second jgd() call in the benchmark. Revisit once a
          # fixed upstream release is available.
          deno-version: v2.7.11

      - name: Install jgd R package
        run: R CMD INSTALL r-pkg
        shell: bash

      - name: Run E2E tests
        run: deno task test
        working-directory: tests
        env:
          ASTRAL_BIN_ARGS: "--no-sandbox --disable-dev-shm-usage"

      - name: Run benchmarks
        run: deno task bench
        working-directory: tests
