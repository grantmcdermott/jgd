name: E2E test

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/e2e-test.yaml
      - server/**
      - r-pkg/**
      - tests/**
      - "!**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/e2e-test.yaml
      - server/**
      - r-pkg/**
      - tests/**
      - "!**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          # TODO: switch to "release"
          r-version: "4.5"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-pkg
          extra-packages: any::ragg, any::ggplot2

      - uses: denoland/setup-deno@v2
        with:
          # Pinned to 2.7.11 pending a regression introduced in 2.7.12:
          # on Windows, a node:net server on a named pipe stops firing
          # 'connection' events after the first client disconnects, so
          # the second jgd() call hangs its WriteFile waiting for a
          # server-side reader that Deno never installs. Tracking in
          # denoland/deno#33366. Revisit once fixed upstream.
          deno-version: v2.7.11

      - name: Install jgd R package
        run: R CMD INSTALL r-pkg
        shell: bash

      - name: Run E2E tests
        run: deno task test
        working-directory: tests
        env:
          ASTRAL_BIN_ARGS: "--no-sandbox --disable-dev-shm-usage"

      - name: Run benchmarks
        run: deno task bench
        working-directory: tests
