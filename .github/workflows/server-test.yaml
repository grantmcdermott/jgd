name: Test server

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/server-test.yaml
      - server/**
      - "!**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/server-test.yaml
      - server/**
      - "!**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          # Pinned to 2.7.11 pending a regression introduced in 2.7.12:
          # on Windows, a node:net server on a named pipe stops firing
          # 'connection' events after the first client disconnects, so
          # listener tests for repeated clients can hang. Tracking in
          # denoland/deno#33366. Revisit once fixed upstream.
          deno-version: v2.7.11
      - run: deno task test
        working-directory: server
      - run: deno task test:e2e
        working-directory: server
        env:
          ASTRAL_BIN_ARGS: "--no-sandbox --disable-dev-shm-usage"
